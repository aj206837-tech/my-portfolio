 <section class="contact-section">
    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- LEFT -->
            <div class="col-md-6 c-left-content">
                <div class="content-wrapper">
                    <p>contact</p>
                    <h1>Chat with me</h1>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Illum, illo!</p>

                    <div class="contact-info mt-4">
                        <h4>+20 123 456 789</h4>
                        <h3>jana@example.com</h3>
                    </div>

                    <div class="c-icons-row">
                        <a href="#" class="social-item">
                            <i class="fab fa-facebook-f"></i>
                            <span>FACEBOOK</span>
                        </a>
                        <a href="#" class="social-item">
                            <i class="fab fa-twitter"></i>
                            <span>TWITTER</span>
                        </a>
                        <a href="#" class="social-item">
                            <i class="fab fa-instagram"></i>
                            <span>INSTAGRAM</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-md-6 gradient-bg-side">
                <form class="custom-form" id="contactForm">

                    <p style="color:black; margin-bottom: 10px;">START A PROJECT</p>
                    <h1 style="color:black">Any project?!</h1>

                    <div class="row g-4">

                        <div class="col-md-6">
                            <div class="input-group">
                                <label>NAME</label>
                                <input type="text" id="userName" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="input-group">
                                <label>EMAIL</label>
                              <input type="email" id="userEmail" required>
                            </div>
                        </div>

                    </div>

                    <div class="input-group mt-4">
                        <label>MESSAGE</label>
                        <textarea id="userMessage" required></textarea>
                    </div>

                   <button type="button" class="talk-btn" id="submitBtn">
                        Send Message
                        <span class="arrow-container">
                            <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M5 19L19 5M19 5H10M19 5V14"
                                      stroke="currentColor"
                                      stroke-width="2"
                                      stroke-linecap="round"
                                      stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </button>

                </form>
            </div>

        </div>
    </div>
</section>
